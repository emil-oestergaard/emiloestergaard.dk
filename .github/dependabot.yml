version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Copenhagen
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: '06:00'
      timezone: Europe/Copenhagen
    commit-message:
      prefix: chore(ci)
      include: scope
