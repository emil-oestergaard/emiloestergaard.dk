version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Copenhagen
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # @astrojs/check peers on typescript ^5.0.0; hold majors until Astro tooling supports TS 6.
      - dependency-name: typescript
        update-types:
          - version-update:semver-major
      # Coordinate astro + mdx + check majors manually; auto-bumps break peer-dep resolution.
      - dependency-name: astro
        update-types:
          - version-update:semver-major
      - dependency-name: '@astrojs/mdx'
        update-types:
          - version-update:semver-major
    commit-message:
      prefix: chore(deps)
      prefix-development: chore(deps-dev)
      include: scope

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
      time: '06:00'
      timezone: Europe/Copenhagen
    commit-message:
      prefix: chore(ci)
      include: scope
