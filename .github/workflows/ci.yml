name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm run check
      - run: npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist
          retention-days: 3

  e2e:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Build site
        run: npm run build
      - name: Run tests
        run: npx playwright test
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

  links:
    name: Link checker
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist
      - name: Check links in built HTML
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --no-progress
            --max-retries 2
            --retry-wait-time 2
            --timeout 20
            --accept 200,201,204,301,302,304,307,308,429
            --base dist
            'dist/**/*.html'
          fail: true

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Run Lighthouse CI
        run: npx lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  deploy:
    name: Deploy to production
    runs-on: ubuntu-latest
    needs: [build, e2e, lighthouse, links]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    environment:
      name: production
      url: https://emiloestergaard.dk
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist
      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null
      - name: Upload release
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SHA: ${{ github.sha }}
        run: |
          rsync --archive --compress --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            dist/ \
            "$DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH/releases/$SHA/"
      - name: Activate release
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          SHA: ${{ github.sha }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "$DEPLOY_PATH/bin/release-swap.sh $SHA"
      - name: Smoke test
        run: |
          curl -fsS --retry 3 --retry-delay 2 -o /dev/null https://emiloestergaard.dk/
          curl -fsS --retry 3 --retry-delay 2 -o /dev/null https://emiloestergaard.dk/rss.xml
